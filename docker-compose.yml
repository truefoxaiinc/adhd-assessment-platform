services:

  backend:
    build: .
    restart: unless-stopped

    command: >
      sh -c "
      python manage.py migrate &&
      daphne -b 0.0.0.0 -p 8000 project_adhd.asgi:application
      "

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped