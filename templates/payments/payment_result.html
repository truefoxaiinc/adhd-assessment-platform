<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }} | ADHD Minder</title>
    <style>
        :root {
            color-scheme: light;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            align-items: center;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            margin: 0;
            min-height: 100vh;
            padding: 24px;
        }
        main {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 12px 36px rgba(31, 41, 55, .12);
            max-width: 440px;
            padding: 40px 32px;
            text-align: center;
        }
        .icon {
            align-items: center;
            background: {% if is_success %}#dcfce7{% else %}#fef3c7{% endif %};
            border-radius: 50%;
            color: {% if is_success %}#15803d{% else %}#b45309{% endif %};
            display: inline-flex;
            font-size: 32px;
            height: 72px;
            justify-content: center;
            width: 72px;
        }
        h1 { color: #111827; font-size: 26px; margin: 24px 0 12px; }
        p { color: #4b5563; line-height: 1.6; margin: 0; }
        .hint { font-size: 14px; margin-top: 24px; }
        .return-link {
            background: #4f46e5;
            border-radius: 10px;
            color: #fff;
            display: inline-block;
            font-weight: 600;
            margin-top: 24px;
            padding: 12px 20px;
            text-decoration: none;
        }
    </style>
</head>
<body>
<main>
    <div class="icon" aria-hidden="true">{% if is_success %}✓{% else %}×{% endif %}</div>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <a class="return-link" href="{{ app_return_url }}">Return to app</a>
    <p class="hint">If the app does not open automatically, tap the button above.</p>
</main>
{{ app_return_url|json_script:"app-return-url" }}
<script>
    const appReturnUrl = JSON.parse(
        document.getElementById("app-return-url").textContent
    );
    window.setTimeout(() => window.location.replace(appReturnUrl), 250);
</script>
</body>
</html>
