<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Reset Code</title>
</head>
<body style="margin:0;padding:0;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#101828;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f7fb;margin:0;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e4e7ec;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="padding:28px 32px 12px 32px;">
              <h1 style="margin:0;font-size:24px;line-height:32px;color:#0b1f44;">ADHD Minder</h1>
              <p style="margin:8px 0 0 0;font-size:15px;line-height:24px;color:#667085;">Password reset verification</p>
            </td>
          </tr>
          <tr>
            <td style="padding:20px 32px 0 32px;">
              <p style="margin:0 0 16px 0;font-size:16px;line-height:26px;color:#344054;">
                Use the verification code below to reset your password.
              </p>
              <div style="margin:24px 0;padding:20px;border-radius:10px;background:#eef6ff;text-align:center;border:1px solid #b9dcff;">
                <div style="font-size:34px;line-height:42px;font-weight:700;letter-spacing:8px;color:#0875d1;">{{ otp }}</div>
              </div>
              <p style="margin:0 0 12px 0;font-size:15px;line-height:24px;color:#475467;">
                This code will expire in 10 minutes.
              </p>
              <p style="margin:0;font-size:15px;line-height:24px;color:#475467;">
                If you did not request this password reset, you can safely ignore this email.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px 32px 32px;">
              <p style="margin:0;font-size:14px;line-height:22px;color:#667085;">
                Thanks,<br>
                ADHD Minder Team
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
